<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛡️ 7级备考冲刺指令</title>
    <style>
        /* --- 1. 基础设定 --- */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f0c29;
            /* 稍微调整背景色，加一点点紫红色的战斗氛围 */
            background-image: radial-gradient(circle at center, #3a1c71 0%, #0f0c29 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none; 
            -webkit-tap-highlight-color: transparent;
        }

        /* 动态网格背景 */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255, 107, 107, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 107, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        /* --- 2. 游戏卡片 --- */
        .game-card {
            position: relative;
            z-index: 10;
            width: 85%;
            max-width: 450px;
            background: rgba(20, 16, 35, 0.85);
            /* 边框改为橙红色，代表挑战/警示 */
            border: 2px solid #ff6b6b;
            border-radius: 20px;
            padding: 35px 20px 20px 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.2);
            backdrop-filter: blur(8px);
            animation: cardFloat 3s ease-in-out infinite;
        }

        /* 头像区域 */
        .avatar-wrapper {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 110px;
            cursor: pointer;
            z-index: 20;
        }
        .avatar-box {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1a1a2e;
            border: 4px solid #ffd700;
            box-shadow: 0 0 20px #ffd700;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .avatar-box:active { transform: scale(0.9); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; background: #ff6b6b; }

        /* 气泡 */
        .speech-bubble {
            position: absolute;
            top: -40px; left: 50%; transform: translateX(-50%) scale(0);
            background: #fff; color: #333; padding: 5px 12px;
            border-radius: 15px; font-weight: bold; font-size: 0.85rem;
            white-space: nowrap; opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            border-width: 8px 8px 0; border-style: solid;
            border-color: #fff transparent; transform: translateX(-50%);
        }
        .speech-bubble.show { transform: translateX(-50%) scale(1); opacity: 1; }

        /* 进度条 */
        .level-info { margin-top: 50px; margin-bottom: 20px; }
        .level-title { font-size: 1.6rem; color: #ff6b6b; text-shadow: 2px 2px 0 #000; margin-bottom: 8px; font-weight: 900; letter-spacing: 1px;}
        .progress-container { width: 90%; height: 18px; background: #333; border-radius: 10px; margin: 0 auto; overflow: hidden; border: 2px solid #555; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff9f43, #ff6b6b); border-radius: 8px; transition: width 1.5s ease-out; position: relative; }
        .progress-bar::after { content: ''; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background-image: linear-gradient(45deg,rgba(255,255,255,.2) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.2) 50%,rgba(255,255,255,.2) 75%,transparent 75%,transparent); background-size: 1rem 1rem; animation: progress-stripes 1s linear infinite; }
        .progress-text { font-size: 0.85rem; color: #ff9f43; margin-top: 5px; font-family: monospace; }

        /* 寄语文本 */
        .message-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px; padding: 15px;
            text-align: left; margin-bottom: 20px;
            border: 1px dashed #ff6b6b;
            display: none; 
            font-size: 1rem; line-height: 1.6; color: #e6edf3;
            max-height: 45vh; /* 适配长文案 */
            overflow-y: auto;
        }
        
        /* 重点强调样式 */
        .highlight { color: #ff9f43; font-weight: bold; }
        .date-highlight { color: #00f2fe; font-weight: bold; background: rgba(0,242,254,0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-box {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #ffd700;
            padding: 8px 12px;
            margin: 10px 0;
            border-radius: 4px;
            font-style: italic;
            color: #ffeaa7;
        }

        /* 按钮 */
        .action-btn {
            background: linear-gradient(90deg, #cb2d3e, #ef473a); /* 红色系战斗按钮 */
            border: none; padding: 12px 25px; color: white; font-size: 1.1rem; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(239, 71, 58, 0.4);
            transition: transform 0.1s; animation: pulseBtn 2s infinite;
            width: 80%;
        }
        .action-btn:active { transform: scale(0.95); }

        /* 徽章 */
        .next-level-badge {
            display: none; margin-top: 20px; padding: 8px;
            background: rgba(255, 159, 67, 0.15); border: 2px solid #ff9f43; border-radius: 10px;
            color: #ff9f43; font-weight: bold; font-size: 0.9rem; animation: bounceIn 0.8s;
        }

        /* 底部提示 */
        .hint-text {
            position: absolute; bottom: 20px; font-size: 0.8rem;
            color: #ff9f43; opacity: 0.6; animation: blink 2s infinite; pointer-events: none;
        }

        /* 动画关键帧 */
        @keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); } }
        @keyframes cardFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes progress-stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }
        @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(239, 71, 58, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 71, 58, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 71, 58, 0); } }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.05); } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.3; } }

        canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
    </style>
</head>

        <div class="message-area" id="messageBox"></div>

        <button class="action-btn" id="mainBtn">🛡️ 接收考前指令 🛡️</button>

        <div class="next-level-badge" id="nextBadge">
            🏆 目标：七级通关<br>
            <span style="font-size:0.75rem; font-weight:normal; opacity:0.8">Ready for Battle!</span>
        </div>
    </div>

    <div class="hint-text">💡 提示：点击屏幕任意位置释放烟花庆祝！</div>

    <script>
        // ==========================================
        //  Part 1: 页面逻辑 (战力条、文案)
        // ==========================================
        window.onload = function() {
            setTimeout(() => {
                const bar = document.getElementById('progressBar');
                const text = document.getElementById('progressText');
                bar.style.width = '100%';
                
                let p = 0;
                const interval = setInterval(() => {
                    p += 2;
                    if(p > 100) {
                        p = 100;
                        clearInterval(interval);
                        text.innerText = "100% | 信心指数满格 🔥";
                        text.style.color = "#ff9f43";
                    } else {
                        text.innerText = `战力充能中... ${p}%`;
                    }
                }, 20); 
            }, 500);
        };

        const messageContent = `
        <span style="font-size:1.1em; font-weight:bold; color:#ff6b6b">七级考试马上就要来啦！🚨</span><br><br>
        虽然七级的代码题比六级有难度，但 <span class="highlight">小暖老师</span> 希望你保持一个强者的心态：<br>
        <div class="quote-box">
            “我遇到的难题，不是来为难我的！<br>
            是来等着我征服的！⚔️”
        </div>
        征服之后，就是更好的你了！<br><br>
        📅 <span class="date-highlight">4月13号</span> 还有一场七级考点梳理课，记得来听 <span class="highlight">小暖</span> 讲题哦！<br>
        (没时间可以看回放，记得联系辅导老师定制你的<span class="highlight">专属复习计划</span>~)<br><br>
        <span style="color:#2ecc71;font-size:1.1em;font-weight:bold">相信自己，你可以的！加油！🚀</span>
        `;

        let isUnlocked = false;
        const mainBtn = document.getElementById('mainBtn');
        const msgBox = document.getElementById('messageBox');
        const badge = document.getElementById('nextBadge');

        mainBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            unlockMessage();
        });

        function unlockMessage() {
            if(isUnlocked) return;
            isUnlocked = true;

            mainBtn.style.display = 'none';
            msgBox.style.display = 'block';
            msgBox.style.animation = 'fadeInUp 0.6s ease';
            msgBox.innerHTML = messageContent; 
            
            // 庆祝时刻！
            setTimeout(() => createFirework(window.innerWidth/2, window.innerHeight * 0.7), 100);
            setTimeout(() => createFirework(window.innerWidth/3, window.innerHeight * 0.6), 400);
            setTimeout(() => createFirework(window.innerWidth*2/3, window.innerHeight * 0.6), 800);
            
            setTimeout(() => {
                badge.style.display = 'block';
            }, 1000);
        }

        // 机器人头像点击
        const avatarBtn = document.getElementById('avatarBtn');
        const bubble = document.getElementById('robotBubble');
        let bubbleTimer;
        
        avatarBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const box = document.getElementById('avatarBox');
            box.style.transform = "scale(1.1) rotate(10deg)";
            setTimeout(() => box.style.transform = "scale(1) rotate(0deg)", 200);

            bubble.classList.add('show');
            clearTimeout(bubbleTimer);
            bubbleTimer = setTimeout(() => {
                bubble.classList.remove('show');
            }, 2000);
        });


        // ==========================================
        //  Part 2: 物理烟花引擎
        // ==========================================
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 6 + 2; 
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                
                this.alpha = 1;
                this.friction = 0.96; 
                this.gravity = 0.05;  
                this.decay = Math.random() * 0.015 + 0.005; 
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createFirework(x, y) {
            const particleCount = 60; 
            const hue = Math.floor(Math.random() * 360);
            const color = `hsl(${hue}, 100%, 60%)`;
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function loop() {
            ctx.fillStyle = 'rgba(15, 12, 41, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.alpha > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(loop);
        }
        loop();

        // 交互：全屏点击
        document.addEventListener('pointerdown', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
